<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<header>
    Book Your Appointment
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="booking.html">Book Appointment</a>
    <a href="doctors.html">Doctors</a>
    <a href="about.html">About Us</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">

    <form id="appointment-form">

        <label>Full Name:</label>
        <input type="text" required>

        <label>Email:</label>
        <input type="email" required>

        <label>Phone:</label>
        <input type="tel" required>

        <label>Select Doctor:</label>
        <select required>
            <option value="">Choose Doctor</option>
            <option>Dr. Smith - Cardiologist</option>
            <option>Dr. Jones - Dentist</option>
            <option>Dr. Taylor - Pediatrician</option>
        </select>

        <label>Date:</label>
        <input type="date" required>

        <label>Time:</label>
        <input type="time" required>

        <button type="submit">Book Appointment</button>
    </form>

    <p id="success-message">Your appointment has been booked successfully!</p>

</div>

<script src="assets/js/script.js"></script>

<footer>
    © 2025 Doctor Appointment Booking System
</footer>

</body>
</html>
